<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Water Tank</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: -apple-system, sans-serif; background: #121212; color: #fff; margin: 0; padding: 20px; }
    .card { background: #1e1e1e; padding: 20px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    .value { font-size: 2em; font-weight: bold; color: #4facfe; }
    .metric { margin-bottom: 15px; }
    .label { font-size: 0.8em; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    canvas { width: 100% !important; height: 200px !important; }
  </style>
</head>
<body>

  <div class="card">
    <div class="metric">
      <div class="label">ACTUAL WATER HEIGHT</div>
      <div class="value" id="height">-- cm</div>
    </div>
    <div class="metric">
      <div class="label">STORED WATER VOLUME</div>
      <div class="value" id="volume">-- m³</div>
    </div>
    <div class="metric" style="margin-bottom: 0;">
      <div class="label">SENSOR DISTANCE (RAW)</div>
      <div class="value" id="distance">-- cm</div>
    </div>
  </div>

  <div class="card">
    <canvas id="tankChart"></canvas>
  </div>

  <script>
    // --- CONFIG ---
    const host = 'wss://fc2fac116e914f4aa3d6c1c4c9c093c6.s1.eu.hivemq.cloud:8884/mqtt'; 
    const options = { username: 'christoskt', password: 'myDtef-vykvyd-xamha0', clientId: 'tank-' + Math.random().toString(16).substr(2, 8) };
    const tasmotaTopic = 'tele/+/SENSOR';

    // --- CHART SETUP ---
    const ctx = document.getElementById('tankChart').getContext('2d');
    const chart = new Chart(ctx, {
      type: 'line',
      data: { labels: [], datasets: [{ data: [], borderColor: '#4facfe', tension: 0.4, fill: true, backgroundColor: 'rgba(79, 172, 254, 0.1)' }] },
      options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
    });

    const client = mqtt.connect(host, options);
    client.on('connect', () => client.subscribe(tasmotaTopic));
    client.on('message', (topic, message) => {
      const payload = JSON.parse(message.toString());
      if (payload.SR04?.Distance !== undefined) {
        const rawDistance = parseFloat(payload.SR04.Distance);
        const heightCm = 373 - rawDistance;
        const vol = heightCm * 1.46835;

        document.getElementById('distance').innerText = rawDistance.toFixed(1) + ' cm';
        document.getElementById('height').innerText = heightCm.toFixed(1) + ' cm';
        document.getElementById('volume').innerText = vol.toFixed(2) + ' m³';
        
        // Update Chart
        const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        chart.data.labels.push(now);
        chart.data.datasets[0].data.push(vol);
        if (chart.data.labels.length > 10) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
        chart.update();
      }
    });
  </script>
</body>
</html>
